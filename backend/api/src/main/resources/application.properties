quarkus.datasource.db-kind=oracle
quarkus.datasource.username=${ORACLE_USERNAME:RM567630}
quarkus.datasource.password=${ORACLE_PASSWORD:150101}
quarkus.datasource.jdbc.url=${ORACLE_JDBC_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521/orcl}
quarkus.datasource.jdbc.driver=oracle.jdbc.OracleDriver
quarkus.datasource.jdbc.max-size=8
quarkus.datasource.jdbc.min-size=0

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.validate-in-dev-mode=true
quarkus.hibernate-orm.log.sql=false

quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:4173,http://localhost:5173,/https://.*\\.vercel\\.app/
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=location
quarkus.http.cors.access-control-max-age=24H

quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi
mp.openapi.extensions.smallrye.info.title=LinkAid API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=API MVP do LinkAid para gestao de tickets, contatos, dentistas, dashboard, relatorios e integracao Watson sandbox.
